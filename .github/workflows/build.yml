            macos-build/BATorrent-macos-arm64.dmg
            macos-build/BATorrent-macos-arm64.dmg.torrent
          body_path: /tmp/release_notes.md

      # Trigger the Store MSIX build automatically after GitHub Release
      # publishes. The MSIX artifact still needs manual upload to Partner
      # Center, but at least the build is ready without a separate dispatch.
      # Trigger the Store MSIX build automatically after GitHub Release
      # publishes. The MSIX artifact still needs manual upload to Partner
      # Center, but at least the build is ready without a separate dispatch.
      - name: Trigger Store MSIX build
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          gh workflow run store.yml -f version="${VERSION}.0"

      - name: Update Homebrew tap
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          gh api repos/Mateuscruz19/homebrew-batorrent/dispatches \
            -f event_type=new-release \
            -f "client_payload[version]=${VERSION}"
