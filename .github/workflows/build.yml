name: Build & Release

on:
  # Tag push -> build all platforms AND publish a GitHub release.
  push:
    tags:
      - 'v*'
  # Manual trigger from the Actions tab -> build all platforms, no release.
  # Use this to grab a Windows installer / DMG / AppImage for testing
  # without cutting a real version.
  workflow_dispatch:
  # PR against main -> build all platforms so CI catches breakage before
  # merge. No release.
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Test suite (Catch2): runs the unit/security/memory tests so regressions —
  # especially resume-data migration and auto-update version detection — are
  # caught in CI instead of by users on upgrade.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true
      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # latest
        with:
          packages: cmake g++ libtorrent-rasterbar-dev libboost-dev libssl-dev libgl-dev
          version: 3.0
      - name: Build tests
        run: |
          cmake -B build-tests -DBAT_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-tests -j$(nproc) --target test_unit test_security test_memory test_nameparser test_bridge
      - name: Run tests
        env:
          LC_ALL: C        # deterministic locale for the formatSize/formatSpeed checks
          QT_QPA_PLATFORM: offscreen
        run: |
          # Success = Catch2 reported all passed. The binary can still segfault
          # in Qt-singleton static teardown (no QCoreApplication in the test
          # harness) AFTER the run — that's a harness artifact, not an app bug,
          # so we gate on the reported result, not the post-run exit code. A
          # real test failure prints the failure summary (no "All tests passed").
          fail=0
          for t in test_unit test_security test_memory test_nameparser test_bridge; do
            echo "=== $t ==="
            out=$(./build-tests/tests/$t 2>&1) || true
            echo "$out"
            echo "$out" | grep -q "All tests passed" || { echo "::error::$t did not pass"; fail=1; }
          done
          exit $fail
      - name: WebUI JS tests
        run: node --test tests/webui/test_webui.mjs

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Qt from aqt (6.7) — Ubuntu's apt Qt (6.2) is too old for the QML
      # (MultiEffect / QtQuick.Effects needs 6.5+). libtorrent/boost/ssl stay apt.
      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # latest
        with:
          packages: cmake g++ libtorrent-rasterbar-dev libboost-dev libssl-dev libfuse2 libgl-dev libglx-dev libegl-dev imagemagick
          version: 3.0

      # Crash reporting (opt-in, same gate as macOS). No apt package for
      # sentry-native, so build it from source when BAT_SENTRY_DSN is set.
      - name: Configure Sentry
        run: |
          if [ -n "${{ vars.BAT_SENTRY_DSN }}" ]; then
            sudo apt-get install -y libcurl4-openssl-dev
            git clone --depth 1 --branch 0.15.2 https://github.com/getsentry/sentry-native.git /tmp/sn
            cmake -S /tmp/sn -B /tmp/sn/build -DCMAKE_BUILD_TYPE=Release \
              -DSENTRY_BACKEND=crashpad -DCMAKE_INSTALL_PREFIX="$HOME/sn-prefix"
            cmake --build /tmp/sn/build --parallel
            cmake --install /tmp/sn/build
            SNDIR=$(dirname "$(find "$HOME/sn-prefix" -name 'sentry-config.cmake' | head -1)")
            echo "BAT_SENTRY_DSN=${{ vars.BAT_SENTRY_DSN }}" >> "$GITHUB_ENV"
            echo "BAT_SENTRY_HANDLER=$(find "$HOME/sn-prefix" -name crashpad_handler | head -1)" >> "$GITHUB_ENV"
            echo "SENTRY_CMAKE_ARGS=-DBAT_SENTRY=ON -Dsentry_DIR=$SNDIR" >> "$GITHUB_ENV"
            echo "SENTRY_ENABLED=1" >> "$GITHUB_ENV"
          else
            echo "SENTRY_ENABLED=0" >> "$GITHUB_ENV"
          fi

      - name: Build
        env:
          BAT_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          BAT_IGDB_ID: ${{ secrets.IGDB_CLIENT_ID }}
          BAT_IGDB_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr ${SENTRY_CMAKE_ARGS:-}
          cmake --build build

      - name: Install to AppDir
        run: |
          DESTDIR=$PWD/AppDir cmake --install build
          # Ship the Crashpad handler next to the binary inside the AppImage.
          [ "$SENTRY_ENABLED" = "1" ] && cp "$BAT_SENTRY_HANDLER" AppDir/usr/bin/crashpad_handler || true

      - name: Resize icon to 256x256
        run: |
          convert AppDir/usr/share/icons/hicolor/256x256/apps/batorrent.png \
            -resize 256x256 \
            AppDir/usr/share/icons/hicolor/256x256/apps/batorrent.png

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export QMAKE=$(which qmake6 2>/dev/null || which qmake)
          export QML_SOURCES_PATHS=$PWD/src/qml
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin qt \
            --desktop-file AppDir/usr/share/applications/batorrent.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/batorrent.png \
            --output appimage
          mv BATorrent-*.AppImage BATorrent-linux-x86_64.AppImage

      - name: Upload debug symbols to Sentry
        if: env.SENTRY_ENABLED == '1' && vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != ''
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload build/BATorrent

      - name: Upload AppImage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-build
          path: BATorrent-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true

      - name: Setup vcpkg
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Cache vcpkg installed packages
        id: cache-vcpkg
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-libtorrent-x64-windows-v1

      - name: Install libtorrent via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: C:\vcpkg\vcpkg install libtorrent:x64-windows

      - name: Cache choco packages
        id: cache-choco
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            C:\ProgramData\chocolatey\lib\imagemagick
            C:\ProgramData\chocolatey\lib\innosetup
            C:\Program Files\ImageMagick*
            C:\Program Files (x86)\Inno Setup 6
          key: choco-imagemagick-innosetup-v1

      - name: Install choco packages
        if: steps.cache-choco.outputs.cache-hit != 'true'
        run: |
          choco install imagemagick innosetup -y --no-progress

      - name: Add choco tools to PATH
        shell: pwsh
        run: |
          $magickPath = (Get-ChildItem "C:\Program Files\ImageMagick*" -Directory | Select-Object -First 1).FullName
          if ($magickPath) { echo "$magickPath" >> $env:GITHUB_PATH }

      - name: Convert PNG to multi-resolution ICO
        run: magick src/images/logo1.png -define icon:auto-resize=256,64,48,32,16 src/images/logo1.ico

      # Crash reporting (opt-in, same gate as macOS). sentry-native via vcpkg;
      # find_package(sentry) resolves through the vcpkg toolchain automatically.
      - name: Configure Sentry
        shell: pwsh
        run: |
          if ("${{ vars.BAT_SENTRY_DSN }}") {
            & "$env:VCPKG_ROOT\vcpkg" install sentry-native:x64-windows
            $handler = (Get-ChildItem -Recurse "$env:VCPKG_ROOT\installed\x64-windows" -Filter crashpad_handler.exe | Select-Object -First 1).FullName
            "BAT_SENTRY_DSN=${{ vars.BAT_SENTRY_DSN }}" | Out-File $env:GITHUB_ENV -Append
            "BAT_SENTRY_HANDLER=$handler" | Out-File $env:GITHUB_ENV -Append
            "SENTRY_CMAKE_ARGS=-DBAT_SENTRY=ON" | Out-File $env:GITHUB_ENV -Append
            "SENTRY_ENABLED=1" | Out-File $env:GITHUB_ENV -Append
          } else {
            "SENTRY_ENABLED=0" | Out-File $env:GITHUB_ENV -Append
          }

      - name: Build
        env:
          BAT_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          BAT_IGDB_ID: ${{ secrets.IGDB_CLIENT_ID }}
          BAT_IGDB_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          $sentryArgs = @()
          if ($env:SENTRY_CMAKE_ARGS) { $sentryArgs = $env:SENTRY_CMAKE_ARGS -split ' ' }
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            @sentryArgs
          cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          mkdir release
          Copy-Item build/Release/BATorrent.exe release/
          windeployqt --qmldir src/qml --compiler-runtime release/BATorrent.exe
          $vcpkgBin = "$env:VCPKG_ROOT/installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin/*.dll" | Copy-Item -Destination release/
          if ($env:SENTRY_ENABLED -eq "1" -and $env:BAT_SENTRY_HANDLER) { Copy-Item "$env:BAT_SENTRY_HANDLER" release/ }
          Compress-Archive -Path release/* -DestinationPath BATorrent-windows-x86_64-portable.zip

      - name: Generate installer wizard images
        shell: pwsh
        run: |
          # Same trick as the macOS Info.plist: pull the version straight
          # from CMakeLists.txt so the wizard image always matches the
          # binary, instead of the previous hardcoded "v2.2.0" that hadn't
          # been touched in three releases.
          $version = (Get-Content CMakeLists.txt | Select-String 'project\(BATorrent VERSION ([\d.]+)\)').Matches.Groups[1].Value
          if (-not $version) { $version = "0.0.0-dev" }
          # Generate at 3x the logical wizard-image size, keeping the exact
          # 164:314 aspect, so WizardImageStretch scales DOWN (crisp) instead of
          # blowing up a 164px bitmap on a 120%/high-DPI wizard (blurry before).
          # Pre-resize the logo to a temp file (PowerShell treats ImageMagick's
          # "( ... )" grouping as a subexpression, so we avoid parentheses).
          magick src/images/logo1.png -resize 320x320 logo_large_tmp.png
          magick -size 492x942 "xc:#0E0A0A" -fill "#1A1A20" -draw "rectangle 0,0 492,6" logo_large_tmp.png -gravity center -geometry +0-60 -composite -gravity south -fill "#8A8A99" -font Arial -pointsize 26 -annotate +0+70 "v$version" "BMP3:installer/wizard_large.bmp"
          magick src/images/logo1.png -resize 132x132 logo_small_tmp.png
          magick -size 165x174 "xc:#0E0A0A" logo_small_tmp.png -gravity center -composite "BMP3:installer/wizard_small.bmp"

      - name: Build Installer
        shell: pwsh
        run: |
          # Inject the real version so the installer matches the binary instead
          # of the value hardcoded in the .iss.
          $version = (Get-Content CMakeLists.txt | Select-String 'project\(BATorrent VERSION ([\d.]+)\)').Matches.Groups[1].Value
          if (-not $version) { $version = "0.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer\batorrent.iss

      - name: Upload zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-zip
          path: BATorrent-windows-x86_64-portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-installer
          path: output/BATorrent-setup-x86_64.exe

      # Symbols, matched to this exact build — keep them so Store/Partner Center
      # crash dumps (and our own CaptureStackBackTrace logs) can be symbolicated.
      - name: Upload symbols (PDB)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-symbols
          path: build/Release/BATorrent.pdb

      - name: Upload debug symbols to Sentry
        if: env.SENTRY_ENABLED == '1' && vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != ''
        continue-on-error: true
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          npm install -g @sentry/cli
          sentry-cli debug-files upload build/Release/BATorrent.pdb build/Release/BATorrent.exe

  build-macos:
    # macos-15 (Sequoia) dropped the legacy AGL framework that Qt 6.7 still links
    # against → "ld: framework 'AGL' not found". Pin to macos-14 (Sonoma) which has it.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true

      - name: Cache Homebrew packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/libtorrent-rasterbar
            /opt/homebrew/Cellar/boost
            /opt/homebrew/Cellar/openssl@3
          key: brew-macos-deps-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: brew-macos-deps-

      - name: Install dependencies
        run: |
          brew install libtorrent-rasterbar boost openssl
          brew link --overwrite libtorrent-rasterbar boost openssl

      # Crash reporting is opt-in: only activates when the BAT_SENTRY_DSN repo
      # variable is set. Without it, the build below is byte-identical to before.
      - name: Configure Sentry
        run: |
          if [ -n "${{ vars.BAT_SENTRY_DSN }}" ]; then
            brew install sentry-native
            PREFIX=$(brew --prefix sentry-native)
            echo "BAT_SENTRY_DSN=${{ vars.BAT_SENTRY_DSN }}" >> "$GITHUB_ENV"
            echo "BAT_SENTRY_HANDLER=$PREFIX/bin/crashpad_handler" >> "$GITHUB_ENV"
            echo "SENTRY_CMAKE_ARGS=-DBAT_SENTRY=ON -Dsentry_DIR=$PREFIX/lib/cmake/sentry" >> "$GITHUB_ENV"
            echo "SENTRY_ENABLED=1" >> "$GITHUB_ENV"
          else
            echo "SENTRY_ENABLED=0" >> "$GITHUB_ENV"
          fi

      - name: Build
        env:
          BAT_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          BAT_IGDB_ID: ${{ secrets.IGDB_CLIENT_ID }}
          BAT_IGDB_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix libtorrent-rasterbar);$(brew --prefix openssl)" \
            ${SENTRY_CMAKE_ARGS:-}
          cmake --build build

      - name: Create app bundle
        run: |
          # Source of truth for the version is CMakeLists.txt — that way the
          # Info.plist matches what the binary was compiled with, regardless
          # of whether this run came from a tag, a PR, or workflow_dispatch.
          VERSION=$(sed -n 's/.*project(BATorrent VERSION \([0-9.]*\)).*/\1/p' CMakeLists.txt)
          [ -z "$VERSION" ] && VERSION="0.0.0-dev"
          mkdir -p dmg/BATorrent.app/Contents/MacOS
          mkdir -p dmg/BATorrent.app/Contents/Resources
          cp build/BATorrent.app/Contents/MacOS/BATorrent dmg/BATorrent.app/Contents/MacOS/
          # Ship the Crashpad handler next to the binary so Sentry finds it.
          [ "$SENTRY_ENABLED" = "1" ] && cp "$BAT_SENTRY_HANDLER" dmg/BATorrent.app/Contents/MacOS/crashpad_handler || true
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' '<dict>' \
            '  <key>CFBundleExecutable</key>' '  <string>BATorrent</string>' \
            '  <key>CFBundleIdentifier</key>' '  <string>com.mateuscruz19.batorrent</string>' \
            '  <key>CFBundleName</key>' '  <string>BATorrent</string>' \
            '  <key>CFBundleVersion</key>' "  <string>${VERSION}</string>" \
            '  <key>CFBundleShortVersionString</key>' "  <string>${VERSION}</string>" \
            '  <key>CFBundlePackageType</key>' '  <string>APPL</string>' \
            '  <key>CFBundleIconFile</key>' '  <string>batorrent</string>' \
            '  <key>LSMinimumSystemVersion</key>' '  <string>12.0</string>' \
            '  <key>NSHighResolutionCapable</key>' '  <true/>' \
            '  <key>CFBundleDocumentTypes</key>' '  <array>' '    <dict>' \
            '      <key>CFBundleTypeExtensions</key>' '      <array><string>torrent</string></array>' \
            '      <key>CFBundleTypeName</key>' '      <string>Torrent File</string>' \
            '      <key>CFBundleTypeRole</key>' '      <string>Viewer</string>' \
            '    </dict>' '  </array>' \
            '  <key>CFBundleURLTypes</key>' '  <array>' '    <dict>' \
            '      <key>CFBundleURLName</key>' '      <string>Magnet Link</string>' \
            '      <key>CFBundleURLSchemes</key>' '      <array><string>magnet</string></array>' \
            '    </dict>' '  </array>' \
            '</dict>' '</plist>' > dmg/BATorrent.app/Contents/Info.plist

      - name: Create ICNS icon
        run: |
          # Apple expects iconset files named icon_<size>x<size>.png plus
          # icon_<size>x<size>@2x.png at 2× the pixel count. We have a
          # 1024×1024 master, so we can fill every required slot up to
          # 512×512@2x without any low-res interpolation.
          mkdir -p batorrent.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src/images/logo1.png --out batorrent.iconset/icon_${size}x${size}.png
          done
          for size in 32 64 256 512 1024; do
            half=$((size / 2))
            sips -z $size $size src/images/logo1.png --out batorrent.iconset/icon_${half}x${half}@2x.png
          done
          iconutil -c icns batorrent.iconset -o dmg/BATorrent.app/Contents/Resources/batorrent.icns

      - name: Deploy Qt and create DMG
        run: |
          macdeployqt dmg/BATorrent.app -qmldir=src/qml
          # Ad-hoc codesign so Gatekeeper doesn't block
          codesign --force --deep --sign - dmg/BATorrent.app
          # hdiutil intermittently fails with "Resource busy" on CI; retry a few
          # times (detaching any stale mount) so beta builds don't flake out.
          for i in 1 2 3; do
            if hdiutil create -volname BATorrent -srcfolder dmg -ov -format UDZO BATorrent-macos-arm64.dmg; then
              break
            fi
            echo "hdiutil attempt $i failed; retrying after detaching stale mounts…"
            hdiutil detach "/Volumes/BATorrent" 2>/dev/null || true
            sleep 5
          done
          test -f BATorrent-macos-arm64.dmg

      # Symbolicates field crashes. Needs SENTRY_AUTH_TOKEN (secret) + SENTRY_ORG
      # and SENTRY_PROJECT (repo variables); skipped (non-fatal) if any is absent.
      - name: Upload debug symbols to Sentry
        if: env.SENTRY_ENABLED == '1' && vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          dsymutil build/BATorrent.app/Contents/MacOS/BATorrent -o BATorrent.dSYM || true
          sentry-cli debug-files upload --include-sources \
            BATorrent.dSYM build/BATorrent.app/Contents/MacOS/BATorrent || true

      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-build
          path: BATorrent-macos-arm64.dmg

  release:
    # Only publish a GitHub release when the trigger is an actual version
    # tag. Manual / PR runs build the artifacts (downloadable from the
    # workflow page) but stop short of cutting a release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          # Extract the section between "## vX.Y.Z" and the next "---" or "## v"
          NOTES=$(awk "/^## v${VERSION}/{found=1; next} /^---$|^## v/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi
          # Write to file to avoid quoting issues
          echo "$NOTES" > /tmp/release_notes.md

      # Web-seeded .torrent per asset: downloads work even when github.com is
      # unreachable (degraded RU routes) as long as one peer is around — and
      # with zero peers the GitHub URL itself serves as the HTTP seed.
      - name: Build release .torrents (web-seeded)
        run: |
          for f in linux-build/BATorrent-linux-x86_64.AppImage \
                   windows-zip/BATorrent-windows-x86_64-portable.zip \
                   windows-installer/BATorrent-setup-x86_64.exe \
                   macos-build/BATorrent-macos-arm64.dmg; do
            python3 scripts/make_release_torrent.py "$f" \
              "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "$f")"
          done

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
