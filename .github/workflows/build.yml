            linux-build/BATorrent-linux-x86_64.AppImage.torrent
            windows-zip/BATorrent-windows-x86_64-portable.zip
            windows-zip/BATorrent-windows-x86_64-portable.zip.torrent
            windows-installer/BATorrent-setup-x86_64.exe
