name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC

jobs:
  analyze:
    name: Analyze (C++)
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake g++ libtorrent-rasterbar-dev libboost-dev libssl-dev libgl-dev libglx-dev libegl-dev
          version: 3.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Build
        env:
          BAT_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          BAT_IGDB_ID: ${{ secrets.IGDB_CLIENT_ID }}
          BAT_IGDB_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
