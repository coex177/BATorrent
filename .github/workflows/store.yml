name: Microsoft Store (MSIX)

# Separate from the main Build & Release workflow. This produces an
# unsigned MSIX package ready for upload to Microsoft Partner Center.
# Microsoft signs it during the Store submission process.
#
# Trigger manually from the Actions tab when preparing a Store update.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 3.0.1.0 — must be 4-part for MSIX)'
        required: true
        default: '3.0.1.0'

permissions:
  contents: read

jobs:
  build-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true

      - name: Setup vcpkg
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Cache vcpkg installed packages
        id: cache-vcpkg
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-libtorrent-x64-windows-v1

      - name: Install libtorrent via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: C:\vcpkg\vcpkg install libtorrent:x64-windows

      - name: Cache choco packages
        id: cache-choco
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            C:\ProgramData\chocolatey\lib\imagemagick
            C:\Program Files\ImageMagick*
          key: choco-imagemagick-v1

      - name: Install ImageMagick
        if: steps.cache-choco.outputs.cache-hit != 'true'
        run: choco install imagemagick -y --no-progress

      - name: Add ImageMagick to PATH
        shell: pwsh
        run: |
          $magickPath = (Get-ChildItem "C:\Program Files\ImageMagick*" -Directory | Select-Object -First 1).FullName
          if ($magickPath) { echo "$magickPath" >> $env:GITHUB_PATH }

      - name: Convert PNG to ICO
        run: magick src/images/logo1.png -define icon:auto-resize=256,64,48,32,16 src/images/logo1.ico

      - name: Build (Store variant — auto-updater disabled, Discover hidden)
        env:
          # Discover is hidden in Store builds, but Search (title-first) and the
          # HUB still use TMDB/IGDB for covers/metadata, so keys are still baked.
          BAT_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          BAT_IGDB_ID: ${{ secrets.IGDB_CLIENT_ID }}
          BAT_IGDB_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBAT_STORE_BUILD=ON
          cmake --build build --config Release

      - name: Prepare MSIX layout
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"

          # Create package layout
          mkdir msix-layout
          Copy-Item build/Release/BATorrent.exe msix-layout/
          windeployqt --qmldir src/qml msix-layout/BATorrent.exe

          # Copy vcpkg DLLs
          $vcpkgBin = "$env:VCPKG_ROOT/installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin/*.dll" | Copy-Item -Destination msix-layout/

          # Copy the template manifest and patch version using byte-level
          # I/O to avoid PowerShell's encoding quirks (BOM insertion,
          # UTF-16 default) that makeappx rejects.
          $raw = [System.IO.File]::ReadAllText("$PWD\installer\msix\AppxManifest.xml", [System.Text.Encoding]::UTF8)
          # Target ONLY the Identity element's Version attribute. The naive
          # pattern Version="..." also matches MinVersion and MaxVersionTested,
          # replacing them with the app version (2.5.1.0) and breaking the
          # TargetDeviceFamily declaration.
          $raw = $raw -creplace '(Identity[^>]*?)Version="[\d.]+"', "`$1Version=`"$version`""
          [System.IO.File]::WriteAllText("$PWD\msix-layout\AppxManifest.xml", $raw, [System.Text.UTF8Encoding]::new($false))

          # Generate logo assets from source PNG at required Store sizes
          $sizes = @(
            @{Name="StoreLogo.png"; Size=50},
            @{Name="Square44x44Logo.png"; Size=44},
            @{Name="Square71x71Logo.png"; Size=71},
            @{Name="Square150x150Logo.png"; Size=150},
            @{Name="Wide310x150Logo.png"; Size=310; Height=150}
          )
          mkdir msix-layout/assets
          foreach ($s in $sizes) {
            $h = if ($s.Height) { $s.Height } else { $s.Size }
            magick src/images/logo1.png -resize "$($s.Size)x$h" -background "#0e0a0a" -gravity center -extent "$($s.Size)x$h" "msix-layout/assets/$($s.Name)"
          }

      - name: Create MSIX package
        shell: pwsh
        run: |
          # makeappx is in the Windows SDK
          $sdkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" | Sort-Object | Select-Object -Last 1
          & $sdkPath.FullName pack /d msix-layout /p BATorrent-store.msix /nv
          Write-Host "Created BATorrent-store.msix"

      - name: Create symbol package (.appxsym)
        shell: pwsh
        run: |
          # An .appxsym is just a zip of the PDBs. Upload this to Partner Center
          # (submission → Packages, or Analytics → Health → symbols) so Store crash
          # dumps symbolicate instead of showing up as "unknown".
          Compress-Archive -Path build/Release/BATorrent.pdb -DestinationPath BATorrent.appxsym -Force

      - name: Upload MSIX
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: msix-store
          path: BATorrent-store.msix

      - name: Upload symbols (.appxsym)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: msix-symbols
          path: BATorrent.appxsym
