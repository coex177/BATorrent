name: Microsoft Store (MSIX)

# Separate from the main Build & Release workflow. This produces an
# unsigned MSIX package ready for upload to Microsoft Partner Center.
# Microsoft signs it during the Store submission process.
#
# Trigger manually from the Actions tab when preparing a Store update.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.5.1.0 — must be 4-part for MSIX)'
        required: true
        default: '2.5.1.0'

jobs:
  build-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true

      - name: Setup vcpkg
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Cache vcpkg installed packages
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-libtorrent-x64-windows-v1

      - name: Install libtorrent via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: C:\vcpkg\vcpkg install libtorrent:x64-windows

      - name: Cache choco packages
        id: cache-choco
        uses: actions/cache@v4
        with:
          path: |
            C:\ProgramData\chocolatey\lib\imagemagick
            C:\Program Files\ImageMagick*
          key: choco-imagemagick-v1

      - name: Install ImageMagick
        if: steps.cache-choco.outputs.cache-hit != 'true'
        run: choco install imagemagick -y --no-progress

      - name: Add ImageMagick to PATH
        shell: pwsh
        run: |
          $magickPath = (Get-ChildItem "C:\Program Files\ImageMagick*" -Directory | Select-Object -First 1).FullName
          if ($magickPath) { echo "$magickPath" >> $env:GITHUB_PATH }

      - name: Convert PNG to ICO
        run: magick src/images/logo1.png -define icon:auto-resize=256,64,48,32,16 src/images/logo1.ico

      - name: Build (Store variant — auto-updater disabled)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DBAT_STORE_BUILD=ON
          cmake --build build --config Release

      - name: Prepare MSIX layout
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"

          # Create package layout
          mkdir msix-layout
          Copy-Item build/Release/BATorrent.exe msix-layout/
          windeployqt msix-layout/BATorrent.exe

          # Copy vcpkg DLLs
          $vcpkgBin = "$env:VCPKG_ROOT/installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin/*.dll" | Copy-Item -Destination msix-layout/

          # Generate manifest inline to avoid any file-encoding surprises
          # from PowerShell's Get-Content / Set-Content pipeline. makeappx
          # is very picky about BOM + encoding.
          $xml = @"
<?xml version="1.0" encoding="utf-8"?>
<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
  xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
  xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
  IgnorableNamespaces="uap rescap">
  <Identity Name="Mateuscruz19.BATorrent" Version="$version"
    Publisher="CN=Mateuscruz19" ProcessorArchitecture="x64"/>
  <Properties>
    <DisplayName>BATorrent</DisplayName>
    <PublisherDisplayName>Mateus Cruz</PublisherDisplayName>
    <Logo>assets\StoreLogo.png</Logo>
    <Description>Open-source BitTorrent client. No ads, no telemetry.</Description>
  </Properties>
  <Dependencies>
    <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0"/>
  </Dependencies>
  <Resources>
    <Resource Language="en-us"/><Resource Language="pt-br"/>
    <Resource Language="zh-hans"/><Resource Language="ja"/>
    <Resource Language="ru"/><Resource Language="es"/><Resource Language="de"/>
  </Resources>
  <Applications>
    <Application Id="BATorrent" Executable="BATorrent.exe" EntryPoint="Windows.FullTrustApplication">
      <uap:VisualElements DisplayName="BATorrent"
        Description="Open-source BitTorrent client with VPN kill switch, anti-Xunlei, Tor, and 7 languages."
        BackgroundColor="#0e0a0a"
        Square150x150Logo="assets\Square150x150Logo.png"
        Square44x44Logo="assets\Square44x44Logo.png">
        <uap:DefaultTile Wide310x150Logo="assets\Wide310x150Logo.png" Square71x71Logo="assets\Square71x71Logo.png"/>
      </uap:VisualElements>
      <Extensions>
        <uap:Extension Category="windows.fileTypeAssociation">
          <uap:FileTypeAssociation Name="torrent">
            <uap:SupportedFileTypes><uap:FileType>.torrent</uap:FileType></uap:SupportedFileTypes>
          </uap:FileTypeAssociation>
        </uap:Extension>
        <uap:Extension Category="windows.protocol">
          <uap:Protocol Name="magnet"><uap:DisplayName>Magnet Link</uap:DisplayName></uap:Protocol>
        </uap:Extension>
      </Extensions>
    </Application>
  </Applications>
  <Capabilities><rescap:Capability Name="runFullTrust"/></Capabilities>
</Package>
"@
          [System.IO.File]::WriteAllText("$PWD\msix-layout\AppxManifest.xml", $xml, [System.Text.UTF8Encoding]::new($false))

          # Generate logo assets from source PNG at required Store sizes
          $sizes = @(
            @{Name="StoreLogo.png"; Size=50},
            @{Name="Square44x44Logo.png"; Size=44},
            @{Name="Square71x71Logo.png"; Size=71},
            @{Name="Square150x150Logo.png"; Size=150},
            @{Name="Wide310x150Logo.png"; Size=310; Height=150}
          )
          mkdir msix-layout/assets
          foreach ($s in $sizes) {
            $h = if ($s.Height) { $s.Height } else { $s.Size }
            magick src/images/logo1.png -resize "$($s.Size)x$h" -background "#0e0a0a" -gravity center -extent "$($s.Size)x$h" "msix-layout/assets/$($s.Name)"
          }

      - name: Create MSIX package
        shell: pwsh
        run: |
          # makeappx is in the Windows SDK
          $sdkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" | Sort-Object | Select-Object -Last 1
          & $sdkPath.FullName pack /d msix-layout /p BATorrent-store.msix /nv
          Write-Host "Created BATorrent-store.msix"

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: msix-store
          path: BATorrent-store.msix
